name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check ruff
        run: |
          ruff check . --output-format=github
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Bandit
        run: |
          bandit -r . -f github --confidence-level high --severity-level high
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify imports
        run: |
          python -c "from core.map_engine import MapEngine; from core.scanner import scan_document_ui; from core.simulator import WhatIfSimulator; from core.bias_engine import BiasEngine; from core.document_validator import validate_document; from utils.pii_masking import mask_pii; from utils.case_law_search import search_case_laws; from utils.document_summarizer import summarize_document; from utils.auth import get_auth_manager; print('All imports successful')"
